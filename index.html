<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Astro Weight Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>If you were on another planet, you would weight...</h1>
  <label for="hr-select">Select a Planet:</label> <br />
<select id="planets"></select>
<p id="output"></p>
<label for="user-weight">Enter your weight (lbs):</label> <br />
<input id="user-weight" type="text" pattern="[0-9]+" placeholder="Weight (lbs)" />
<button id="calculate-button">Calculate</button>


  <script src="main.js" charset="utf-8"></script>
</body>

</html>
